<!DOCTYPE html>
<html>
<head>
<title>Library Layout</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

.container {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 10px;
    padding: 20px;
}

.seat {
    background: green;
    color: white;
    padding: 20px;
    border-radius: 10px;
}

/* Layout positioning */
.front { grid-column: span 6; }
.back { grid-column: span 6; }
.side { grid-column: span 8; }
.corner { grid-column: span 2; transform: rotate(-10deg); }

</style>
</head>

<body>

<h2>📚 Library Seat Layout</h2>

<div class="container">

<!-- Front 6 -->
<div class="seat">1</div>
<div class="seat">2</div>
<div class="seat">3</div>
<div class="seat">4</div>
<div class="seat">5</div>
<div class="seat">6</div>

<!-- Back 6 -->
<div class="seat">7</div>
<div class="seat">8</div>
<div class="seat">9</div>
<div class="seat">10</div>
<div class="seat">11</div>
<div class="seat">12</div>

<!-- Side 8 -->
<div class="seat">13</div>
<div class="seat">14</div>
<div class="seat">15</div>
<div class="seat">16</div>
<div class="seat">17</div>
<div class="seat">18</div>
<div class="seat">19</div>
<div class="seat">20</div>

<!-- Corner 2 -->
<div class="seat corner">21</div>
<div class="seat corner">22</div>

</div>

</body>
</html>
