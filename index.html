<!DOCTYPE html>
<html>
<head>
<title>Library Layout</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

.container {
    display: grid;
    grid-template-columns: 1fr 0.5fr 1fr;
    gap: 20px;
    padding: 20px;
}

/* Seat style */
.seat {
    background: green;
    color: white;
    padding: 15px;
    border-radius: 10px;
    margin: 5px;
}

/* Left & Right */
.left, .right {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
}

/* Walkway */
.walkway {
    background: transparent;
}

/* Corner seats */
.corner {
    margin-top: 20px;
}
</style>

</head>

<body>

<h2>📚 Library Seat Layout</h2>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="seat">1</div>
        <div class="seat">2</div>
        <div class="seat">3</div>
        <div class="seat">4</div>
        <div class="seat">5</div>
        <div class="seat">6</div>
        <div class="seat">7</div>
        <div class="seat">8</div>
        <div class="seat">9</div>
        <div class="seat">10</div>
    </div>

    <!-- WALKWAY -->
    <div class="walkway"></div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="seat">11</div>
        <div class="seat">12</div>
        <div class="seat">13</div>
        <div class="seat">14</div>
        <div class="seat">15</div>
        <div class="seat">16</div>
        <div class="seat">17</div>
        <div class="seat">18</div>
        <div class="seat">19</div>
        <div class="seat">20</div>
    </div>

</div>

<!-- Corner seats -->
<div class="corner">
    <div class="seat" style="display:inline-block; transform:rotate(-15deg);">21</div>
    <div class="seat" style="display:inline-block; transform:rotate(15deg);">22</div>
</div>

</body>
</html>
