<!DOCTYPE html>
<html>
<head>
<title>Library Seat System</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

/* LOGIN */
#login {
    margin-top: 100px;
}

/* Layout */
.layout {
    position: relative;
    width: 350px;
    height: 650px;
    margin: auto;
    border: 2px solid black;
    display: none;
}

/* Seat */
.seat {
    position: absolute;
    width: 70px;
    height: 70px;
    background: green;
    color: white;
    font-size: 14px;
    border-radius: 8px;
    text-align: center;
    padding-top: 10px;
    cursor: pointer;
}

/* Gate */
.gate {
    position: absolute;
    bottom: 10px;
    left: 10px;
}

/* RIGHT (1–10) */
#s1 { top: 20px; right: 10px; }
#s2 { top: 90px; right: 10px; }
#s3 { top: 160px; right: 10px; }
#s4 { top: 230px; right: 10px; }
#s5 { top: 300px; right: 10px; }
#s6 { top: 370px; right: 10px; }
#s7 { top: 440px; right: 10px; }
#s8 { top: 510px; right: 10px; }
#s9 { top: 580px; right: 10px; }
#s10 { top: 650px; right: 10px; }

/* MIDDLE (11–16) */
#s11 { top: 20px; right: 120px; }
#s12 { top: 90px; right: 120px; }
#s13 { top: 160px; right: 120px; }
#s14 { top: 230px; right: 120px; }
#s15 { top: 300px; right: 120px; }
#s16 { top: 370px; right: 120px; }

/* LEFT (17–22) */
#s17 { top: 20px; left: 10px; }
#s18 { top: 90px; left: 10px; }
#s19 { top: 160px; left: 10px; }
#s20 { top: 230px; left: 10px; }
#s21 { top: 300px; left: 10px; transform: rotate(-10deg); }
#s22 { top: 370px; left: 10px; transform: rotate(-10deg); }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="pass">
    <button onclick="login()">Login</button>
</div>

<h2 id="title" style="display:none;">📚 Library Seat System</h2>

<div class="layout" id="layout">

<div class="seat" id="s1">1</div>
<div class="seat" id="s2">2</div>
<div class="seat" id="s3">3</div>
<div class="seat" id="s4">4</div>
<div class="seat" id="s5">5</div>
<div class="seat" id="s6">6</div>
<div class="seat" id="s7">7</div>
<div class="seat" id="s8">8</div>
<div class="seat" id="s9">9</div>
<div class="seat" id="s10">10</div>

<div class="seat" id="s11">11</div>
<div class="seat" id="s12">12</div>
<div class="seat" id="s13">13</div>
<div class="seat" id="s14">14</div>
<div class="seat" id="s15">15</div>
<div class="seat" id="s16">16</div>

<div class="seat" id="s17">17</div>
<div class="seat" id="s18">18</div>
<div class="seat" id="s19">19</div>
<div class="seat" id="s20">20</div>
<div class="seat" id="s21">21</div>
<div class="seat" id="s22">22</div>

<div class="gate">🚪 Gate</div>

</div>

<script>
let DB = JSON.parse(localStorage.getItem("DB")) || {};

// LOGIN
function login() {
    let p = document.getElementById("pass").value;
    if (p === "library123") {
        document.getElementById("login").style.display = "none";
        document.getElementById("layout").style.display = "block";
        document.getElementById("title").style.display = "block";
    } else {
        alert("Wrong Password");
    }
}

// LOAD + CLICK
document.querySelectorAll(".seat").forEach(seat => {
    let id = seat.innerText;

    if (DB[id]) {
        seat.style.background = "red";
        seat.innerText = id + "\n" + DB[id].name;
    }

    seat.addEventListener("click", () => {
        if (DB[id]) {
            let info = "Name: " + DB[id].name + "\nDate: " + DB[id].date;

            if (confirm(info + "\n\nRemove booking?")) {
                delete DB[id];
                seat.style.background = "green";
                seat.innerText = id;
            }
        } else {
            let name = prompt("Enter Name:");
            let date = prompt("Enter Join Date:");

            if (name && date) {
                DB[id] = { name, date };
                seat.style.background = "red";
                seat.innerText = id + "\n" + name;
            }
        }

        localStorage.setItem("DB", JSON.stringify(DB));
    });
});
</script>

</body>
</html>
